            <div class="mt-6 flex gap-2">

                <button id="random-btn" class="flex-1 bg-gray-600 text-white py-2 rounded hover:bg-gray-700">ランダム</button>
            </div>
        </div>

    </div>
    <script>
        /* 【ノート：JavaScriptの役割】
          GitHub Pagesは「静的」だけど、このJSが動くことで「動的」な体験を作っている。
          1. YouTube APIと通信して動画を操る。
          2. クリックされた曲のIDを特定して中身を書き換える。
        */
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var currentVideoIndex = -1;
        const songs = document.querySelectorAll('#setlist li');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                // 【初期状態】ページを開いた時に最初に出る曲のID。
                videoId: 'TMoOdbjcjGU', 
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        /* 【将来の野望メモ：ハイブリッドアプリ化】
          もしアプリにするなら、この下の処理を「スマホの通知」と連動させたり、
          「LocalStorage」を使って自分の再生回数をカウントしたりする機能を追加したい。
        */

        songs.forEach((song, index) => {
            song.addEventListener('click', () => {
                playVideo(index);
            });
        });

        function playVideo(index) {
            currentVideoIndex = index;
            const videoId = songs[index].getAttribute('data-video-id');
            const title = songs[index].querySelector('span').innerText;

            player.loadVideoById(videoId);
            document.getElementById('current-title').innerText = title;

            songs.forEach(s => s.classList.remove('active-song'));
            songs[index].classList.add('active-song');
        }

        document.getElementById('next-btn').addEventListener('click', () => {
            let nextIndex = (currentVideoIndex + 1) % songs.length;
            playVideo(nextIndex);
        });

        document.getElementById('random-btn').addEventListener('click', () => {
            let randomIndex = Math.floor(Math.random() * songs.length);
            playVideo(randomIndex);
        });

        function onPlayerStateChange(event) {
            // 曲が終わったら自動で「次へ」ボタンを擬似クリックする仕組み
            if (event.data == YT.PlayerState.ENDED) {
                document.getElementById('next-btn').click();
            }
        }
    </script>
</body>
</html>
