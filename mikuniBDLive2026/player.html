<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Live Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
        <h1 id="live-title" class="text-2xl font-bold mb-4">Loading...</h1>
        
        <div id="player" class="aspect-video w-full mb-4"></div>

        <h2 id="current-title" class="text-xl mb-4 font-semibold text-blue-600">曲を選択してください</h2>
        
        <ul id="setlist" class="space-y-2">
            </ul>
    </div>

    <script>
        let player;
        let songsData = [];
        const urlParams = new URLSearchParams(window.location.search);
        const liveId = urlParams.get('id');

        // YouTube APIの準備
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '360',
                width: '640',
                videoId: '', 
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady() {
            // APIの準備ができたらJSONを読み込む
            if (liveId) {
                loadLiveData(liveId);
            }
        }

        function loadLiveData(id) {
            fetch(`data/${id}.json`)
                .then(res => {
                    if (!res.ok) throw new Error('Network response was not ok');
                    return res.json();
                })
                .then(data => {
                    songsData = data.tracks;
                    document.getElementById('live-title').innerText = data.title;
                    
                    const list = document.getElementById('setlist');
                    list.innerHTML = '';
                    songsData.forEach((track, index) => {
                        const li = document.createElement('li');
                        li.className = "p-3 border rounded cursor-pointer hover:bg-blue-50 transition";
                        li.innerText = track.title;
                        li.onclick = () => {
                            player.loadVideoById(track.id);
                            document.getElementById('current-title').innerText = track.title;
                        };
                        list.appendChild(li);
                    });
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById('live-title').innerText = "データが見つかりません (404)";
                });
        }
    </script>
</body>
</html>
