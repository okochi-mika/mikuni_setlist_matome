<script>
        let player;
        let songsData = [];
        const urlParams = new URLSearchParams(window.location.search);
        const liveId = urlParams.get('id');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '360',
                width: '640',
                videoId: '', 
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady() {
            // API準備完了後の処理
        }

        function loadLiveData(id) {
            fetch(`data/${id}.json`)
                .then(res => {
                    if (!res.ok) throw new Error('Network response was not ok');
                    return res.json();
                })
                .then(data => {
                    songsData = data.tracks;
                    document.getElementById('live-title').innerText = data.title;
                    
                    const list = document.getElementById('setlist');
                    list.innerHTML = '';

                    // ★ここから修正：見た目をリッチにする
                    songsData.forEach((track, index) => {
                        const li = document.createElement('li');
                        // クラス名を増やして、横並び(flex)・角丸・影をつけます
                        li.className = "p-3 bg-white border border-gray-200 rounded-lg shadow-sm flex justify-between items-center cursor-pointer hover:bg-blue-50 active:bg-blue-100 transition duration-200";
                        
                        // 中身を「曲名」と「青いボタン」のセットにする
                        li.innerHTML = `
                            <span class="text-gray-800 font-medium">${track.title}</span>
                            <button class="bg-blue-600 text-white text-xs px-3 py-1.5 rounded-full shadow-sm">再生</button>
                        `;

                        li.onclick = () => {
                            player.loadVideoById(track.id);
                            document.getElementById('current-title').innerText = track.title;
                            
                            // 選択した曲を目立たせる（青枠をつける）
                            document.querySelectorAll('#setlist li').forEach(el => el.classList.remove('border-blue-500', 'bg-blue-50'));
                            li.classList.add('border-blue-500', 'bg-blue-50');
                        };
                        list.appendChild(li);
                    });
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById('live-title').innerText = "データが見つかりません (404)";
                });
        }

        if (liveId) {
            loadLiveData(liveId);
        }
    </script>
