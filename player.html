<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body class="bg-[#f7f3e9] p-4 md:p-8"> <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        
        <div class="flex justify-center mb-6">
            <img id="live-logo" src="images/mikunibd.png" alt="Logo" class="max-h-24 object-contain">
        </div>

        <h1 id="live-title" class="text-xl md:text-2xl font-bold mb-4 text-center border-b pb-4 text-gray-800">Loading...</h1>
        
        <div id="player" class="aspect-video w-full mb-4 rounded overflow-hidden bg-black"></div>

        <div class="bg-gray-50 border border-gray-100 p-3 rounded-md mb-6 text-sm text-gray-500">
            現在再生中：<span id="current-title" class="font-bold text-blue-600">未選択</span>
        </div>
        
        <h3 class="text-lg font-bold mb-3 text-gray-700 border-l-4 border-blue-500 pl-2">Setlist</h3>
        <ul id="setlist" class="space-y-2">
            </ul>
            <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-gray-100">
            <button onclick="playNextSong()" class="bg-[#334155] text-white py-3 rounded-md font-bold shadow-md active:scale-95 transition">
                次の曲へ
            </button>
            <button onclick="playRandomSong()" class="bg-[#64748b] text-white py-3 rounded-md font-bold shadow-md active:scale-95 transition">
                ランダム
            </button>
        </div>
    </div>

    <script>
        let player;
        let songsData = [];
        let currentTrackIndex = 0;
        const urlParams = new URLSearchParams(window.location.search);
        const liveId = urlParams.get('id');

        // 1. YouTube APIが準備できたらプレイヤーを作る
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '360',
                width: '640',
                videoId: '', 
                events: { 
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 2. プレイヤーの準備ができたらJSONを読み込む（これが重要！）
        function onPlayerReady() {
            if (liveId) {
                loadLiveData(liveId);
            }
        }

        // 3. 曲が終わった時の自動処理
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                playNextSong(); 
            }
        }

        // --- 再生コントロール用関数 ---

        function playNextSong() {
            if (currentTrackIndex < songsData.length - 1) {
                currentTrackIndex++;
                playSelectedTrack();
            } else {
                // 最後まで行ったら最初に戻る（ループ再生）
                currentTrackIndex = 0;
                playSelectedTrack();
            }
        }

        function playRandomSong() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * songsData.length);
            } while (newIndex === currentTrackIndex && songsData.length > 1);
            
            currentTrackIndex = newIndex;
            playSelectedTrack();
        }

        function playSelectedTrack() {
            if (!player || !player.loadVideoById) return; // プレイヤーがない場合は無視
            const track = songsData[currentTrackIndex];
            player.loadVideoById(track.id);
            document.getElementById('current-title').innerText = track.title;
            updateHighlight(currentTrackIndex);
        }
        
        function updateHighlight(index) {
            const listItems = document.querySelectorAll('#setlist li');
            listItems.forEach(el => el.classList.remove('border-blue-400', 'bg-blue-50'));
            if (listItems[index]) {
                listItems[index].classList.add('border-blue-400', 'bg-blue-50');
            }
        }

        // 4. データを読み込んでリストを作る
        function loadLiveData(id) {
            fetch(`data/${id}.json`)
                .then(res => res.json())
                .then(data => {
                    songsData = data.tracks;
                    document.getElementById('live-title').innerText = data.title;
                    
                    const logoPath = data.logo ? `images/${data.logo}` : 'images/mikunibd.png';
                    document.getElementById('live-logo').src = logoPath;

                    const list = document.getElementById('setlist');
                    list.innerHTML = '';

                    songsData.forEach((track, index) => {
                        const li = document.createElement('li');
                        li.className = "p-3 bg-white border border-gray-100 rounded-lg shadow-sm flex justify-between items-center cursor-pointer hover:bg-blue-50 transition duration-200";
                        
                        li.innerHTML = `
                            <span class="text-gray-700 font-medium">${track.title}</span>
                            <button class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full uppercase tracking-tighter">再生</button>
                        `;

                        li.onclick = () => {
                            currentTrackIndex = index;
                            playSelectedTrack();
                        };
                        list.appendChild(li);
                    });
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById('live-title').innerText = "データが見つかりません";
                });
        }
    </script>
</body>
</html>
