<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body class="bg-[#f7f3e9] p-4 md:p-8"> <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        
        <div class="flex justify-center mb-6">
            <img id="live-logo" src="images/mikunibd.png" alt="Logo" class="max-h-24 object-contain">
        </div>

        <h1 id="live-title" class="text-xl md:text-2xl font-bold mb-4 text-center border-b pb-4 text-gray-800">Loading...</h1>
        
        <div id="player" class="aspect-video w-full mb-4 rounded overflow-hidden bg-black"></div>

        <div class="bg-gray-50 border border-gray-100 p-3 rounded-md mb-6 text-sm text-gray-500">
            現在再生中：<span id="current-title" class="font-bold text-blue-600">未選択</span>
        </div>
        
        <h3 class="text-lg font-bold mb-3 text-gray-700 border-l-4 border-blue-500 pl-2">Setlist</h3>
        <ul id="setlist" class="space-y-2">
            </ul>
    </div>

    <script>
        let player;
        let songsData = [];
        const urlParams = new URLSearchParams(window.location.search);
        const liveId = urlParams.get('id');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '360',
                width: '640',
                videoId: '', 
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady() {
            if (liveId) loadLiveData(liveId);
        }

        function loadLiveData(id) {
            fetch(`data/${id}.json`)
                .then(res => {
                    if (!res.ok) throw new Error('Network response was not ok');
                    return res.json();
                })
                .then(data => {
                    songsData = data.tracks;
                    document.getElementById('live-title').innerText = data.title;
                    
                    // 【追加】ロゴの差し替え処理（JSONにlogo指定があればそれ、なければ共通ロゴ）
                    const logoPath = data.logo ? `images/${data.logo}` : 'images/mikunibd.png';
                    document.getElementById('live-logo').src = logoPath;

                    const list = document.getElementById('setlist');
                    list.innerHTML = '';

                    songsData.forEach((track, index) => {
                        const li = document.createElement('li');
                        li.className = "p-3 bg-white border border-gray-100 rounded-lg shadow-sm flex justify-between items-center cursor-pointer hover:bg-blue-50 transition duration-200";
                        
                        li.innerHTML = `
                            <span class="text-gray-700 font-medium">${track.title}</span>
                            <button class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full uppercase tracking-tighter">再生</button>
                        `;

                        li.onclick = () => {
                            // 1. YouTubeを再生する
                        player.loadVideoById(track.id);
                        
                        // 2. 「現在再生中」のテキストだけを書き換える
                        // // ※ ここが 'live-logo' になっていたら 'current-title' に直す！
                        document.getElementById('current-title').innerText = track.title;
    
                        // 3. リストの見た目を整える
                        document.querySelectorAll('#setlist li').forEach(el => el.classList.remove('border-blue-400', 'bg-blue-50'));
                        li.classList.add('border-blue-400', 'bg-blue-50');
                    };
                    // ↓ これを足す！作ったリストを画面に追加する命令です
                        list.appendChild(li);
                    });                  
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById('live-title').innerText = "データが見つかりません";
                });
        }
    </script>
</body>
</html>
